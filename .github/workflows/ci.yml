name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-format clang-tidy lld libc++-dev
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -y build-essential libc++abi-dev

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Build (verbose)
        run: xmake build -vD

      - name: Generate compile_commands.json
        run: xmake project -k compile_commands build

      - name: Run quality checks
        run: utils/check.sh --skip-build
